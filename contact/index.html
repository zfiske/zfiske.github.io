<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Lora:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>Contact - Zach Fiske</title>
  <script>
    fetch('/favicon.html')
      .then(response => response.text())
      .then(data => {
        document.head.insertAdjacentHTML('beforeend', data);
      })
      .catch(err => console.error('Error loading favicon:', err));
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div id="navbar-placeholder"></div>

<main>
<div class="section full-text">
  <div class="section-text">
    <h2>Contact</h2>
    <form id="contact-form" action="https://formspree.io/f/mreoyqea" method="POST">
      <input type="text" name="name" placeholder="Your Name" required><br><br>
      <input type="email" name="email" placeholder="Your Email" required><br><br>
      <textarea name="message" placeholder="Your Message" rows="5" required></textarea><br><br>
      <button type="submit">Send</button>
    </form>      
    <p id="form-status"></p>
  </div>
</div>
  
<div class="section">
  <div class="insta-wrapper">
    <blockquote class="instagram-media"
      data-instgrm-permalink="https://www.instagram.com/p/C_oOU3SJiWW/"
      data-instgrm-version="14">
    </blockquote>
  </div>

  <div class="insta-wrapper">
    <div class="strava-embed-placeholder"
         data-embed-type="activity"
         data-embed-id="11997414627"
         data-style="standard">
    </div>
  </div>
</div>

</main>
  
<div id="footer"></div>
  
<script async src="https://www.instagram.com/embed.js"></script>
<script src="https://strava-embeds.com/embed.js"></script>
  
<script>
  fetch('/navbar.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('navbar-placeholder').innerHTML = data;
    })
    .catch(error => console.error('Error loading navbar:', error));

  fetch("/footer.html")
    .then(response => response.text())
    .then(data => {
      document.getElementById("footer").innerHTML = data;
    });
  
  const form = document.getElementById("contact-form");
  const status = document.getElementById("form-status");

  form.addEventListener("submit", async (e) => {
    e.preventDefault(); // stop redirect

    const data = new FormData(form);

    const response = await fetch(form.action, {
      method: form.method,
      body: data,
      headers: {
        'Accept': 'application/json'
      }
    });

    if (response.ok) {
      status.innerHTML = "Thanks for your message!";
      form.reset();
    } else {
      status.innerHTML = "Oops! Something went wrong. Please reload the page and try again.";
    }
  });
</script>
  
</body>
</html>
