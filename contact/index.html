<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Lora:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>Contact - Zach Fiske</title>
  <script>
    fetch('/favicon.html')
      .then(response => response.text())
      .then(data => {
        document.head.insertAdjacentHTML('beforeend', data);
      })
      .catch(err => console.error('Error loading favicon:', err));
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div id="navbar-placeholder"></div>

<main>
  <div class="section">
  <div class="insta-wrapper">
    <blockquote class="instagram-media"
      data-instgrm-permalink="https://www.instagram.com/p/C_oOU3SJiWW/"
      data-instgrm-version="14">
    </blockquote>
  </div>

  <div class="map-wrapper">
  <iframe 
    height="405" 
    width="590" 
    frameborder="0" 
    allowtransparency="true" 
    scrolling="no" 
    src="https://www.strava.com/activities/11997414627/embed">
  </iframe>
  </div>
</div>

</main>
  
<div id="footer"></div>
  
<script async src="https://www.instagram.com/embed.js"></script>
  
<script>
  fetch('/navbar.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('navbar-placeholder').innerHTML = data;
    })
    .catch(error => console.error('Error loading navbar:', error));

  fetch("/footer.html")
    .then(response => response.text())
    .then(data => {
      document.getElementById("footer").innerHTML = data;
    });
</script>

</body>
</html>
