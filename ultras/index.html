<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Lora:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>Ultras - Zach Fiske</title>
  <script>
    fetch('/favicon.html')
      .then(response => response.text())
      .then(data => {
        document.head.insertAdjacentHTML('beforeend', data);
      })
      .catch(err => console.error('Error loading favicon:', err));
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div id="navbar-placeholder"></div>
  
<div class="page-banner">
  <img src="/images/i-ultras/pemi-golden.jpg" alt="">
  <div class="banner-text">Ultras</div>
</div>
  
<div class="section">
  <img src="/images/i-ultras/javelina-paid.jpg" alt="" title="2025 Javelina Jundred (Photo credit: Howie Stern Photography)">
  <div class="section-text">
    <h2>Javelina</h2>
    <p>Text content here. (Photo credit: Howie Stern Photography).</p>
  </div>
</div>

<div class="section reverse">
  <img src="/images/i-ultras/leadville-2024.jpg" alt="">
  <div class="section-text">
    <h2>Leadville</h2>
    <p>More content here.</p>
  </div>
</div>
  
<div class="section">
  <img src="/images/i-ultras/pemi-trail.jpg" alt="">
  <div class="section-text">
    <h2>Pemi</h2>
    <p>Text content here.</p>
  </div>
</div>

<div class="section reverse">
  <img src="/images/i-ultras/jfk-2022.jpg" alt="">
  <div class="section-text">
    <h2>JFK</h2>
    <p>More content here.</p>
  </div>
</div>
  
  <script>
  fetch('/navbar.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('navbar-placeholder').innerHTML = data;
    })
    .catch(error => console.error('Error loading navbar:', error));
  </script>
</body>
</html>
